<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSA Pattern Practice Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --card-hover-bg: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #3b82f6;
            --easy-color: #10b981;
            --medium-color: #f59e0b;
            --hard-color: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            padding: 4rem 0 3rem;
            position: relative;
        }

        .header-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background: var(--accent-color);
            filter: blur(150px);
            opacity: 0.2;
            z-index: 0;
            pointer-events: none;
        }

        header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            z-index: 1;
        }

        header p {
            font-size: 1.2rem;
            color: var(--text-secondary);
            position: relative;
            z-index: 1;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .search-bar {
            flex-grow: 1;
            max-width: 500px;
            position: relative;
        }

        .search-bar input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            background: rgba(15, 23, 42, 0.6);
            color: white;
            font-size: 1rem;
            outline: none;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .search-bar input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
        }

        .search-bar i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .filters {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        /* Group Sections */
        .topic-group {
            margin-bottom: 4rem;
        }

        .topic-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--card-border);
        }

        .topic-header h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #e2e8f0;
        }

        .topic-header .topic-icon {
            font-size: 1.5rem;
            color: var(--accent-color);
            background: rgba(59, 130, 246, 0.1);
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }

        .topic-header .topic-count {
            margin-left: auto;
            background: var(--card-bg);
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1.5rem;
            text-decoration: none;
            color: white;
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-left: 1px solid rgba(255, 255, 255, 0.15);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--accent-color);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card:hover {
            transform: translateY(-5px);
            background: var(--card-hover-bg);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .card:hover::before {
            transform: scaleX(1);
        }

        .global-progress {
            margin-top: 1.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--easy-color);
        }

        .progress-bar-container {
            max-width: 400px;
            margin: 1rem auto 0;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            position: relative;
            overflow: hidden;
        }

        .progress-bar {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            background: var(--easy-color);
            width: 0%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .check-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--card-border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
            margin-left: 1rem;
            z-index: 2;
        }

        .check-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .card.completed {
            opacity: 0.8;
            background: rgba(16, 185, 129, 0.05);
        }

        .card.completed .check-btn {
            background: var(--easy-color);
            border-color: var(--easy-color);
            color: white;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        .card.completed::before {
            background: var(--easy-color);
        }

        .card.completed h3 {
            text-decoration: line-through;
            color: var(--text-secondary);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .card h3 {
            font-size: 1.15rem;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 0.5rem;
        }

        .badge-difficulty {
            padding: 0.25rem 0.75rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }

        .badge-difficulty.easy {
            background: rgba(16, 185, 129, 0.15);
            color: var(--easy-color);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .badge-difficulty.medium {
            background: rgba(245, 158, 11, 0.15);
            color: var(--medium-color);
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .badge-difficulty.hard {
            background: rgba(239, 68, 68, 0.15);
            color: var(--hard-color);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .card-footer {
            margin-top: auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .topic-tag {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .action-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: all 0.2s ease;
            opacity: 0;
            transform: translateX(-10px);
        }

        .card:hover .action-icon {
            opacity: 1;
            transform: translateX(0);
            background: var(--accent-color);
        }

        .empty-state {
            text-align: center;
            padding: 4rem;
            color: var(--text-secondary);
            display: none;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        footer {
            text-align: center;
            padding: 3rem 0;
            color: var(--text-secondary);
            border-top: 1px solid var(--card-border);
            margin-top: 2rem;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-gradient);
        }

        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2.5rem;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .search-bar {
                max-width: none;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <div class="header-bg"></div>
            <h1>DSA Pattern Practice</h1>
            <p>Master Algorithms through Pattern Recognition</p>
            <div class="global-progress" id="globalProgress">0 / 0 Completed (0%)</div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
        </header>

        <div class="controls">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search problems (e.g. 'Maximum Points', 'Tree')...">
            </div>
            <div class="filters" id="difficultyFilters">
                <button class="filter-btn active" data-filter="all">All Difficulties</button>
                <button class="filter-btn" data-filter="Easy">Easy</button>
                <button class="filter-btn" data-filter="Medium">Medium</button>
                <button class="filter-btn" data-filter="Hard">Hard</button>
            </div>
        </div>

        <div id="content">
            <!-- Problem groups will be injected here -->
        </div>

        <div class="empty-state" id="emptyState">
            <i class="fas fa-search"></i>
            <h3>No problems found</h3>
            <p>Try adjusting your search or filters.</p>
        </div>

        <footer>
            <p>Personal DSA Practice Dashboard • Built for mastery.</p>
        </footer>
    </div>

        const contentDiv = document.getElementById('content');
        const emptyState = document.getElementById('emptyState');
        const searchInput = document.getElementById('searchInput');
        const filterBtns = document.querySelectorAll('.filter-btn');

        let currentFilter = 'all';
        let searchQuery = '';
        let completedProblems = JSON.parse(localStorage.getItem('dsaTrackerCompleted')) || [];

        function toggleComplete(e, title) {
            e.preventDefault();
            e.stopPropagation();

            const index = completedProblems.indexOf(title);
            if (index === -1) {
                completedProblems.push(title);
            } else {
                completedProblems.splice(index, 1);
            }

            localStorage.setItem('dsaTrackerCompleted', JSON.stringify(completedProblems));
            renderProblems();
        }

        function renderProblems() {
            contentDiv.innerHTML = '';

            // Filter problems
            const filteredProblems = problems.filter(p => {
                const matchesSearch = p.title.toLowerCase().includes(searchQuery) ||
                    p.topic.toLowerCase().includes(searchQuery);
                const matchesDifficulty = currentFilter === 'all' || p.difficulty === currentFilter;
                return matchesSearch && matchesDifficulty;
            });

            if (filteredProblems.length === 0) {
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';

            // Group by topic
            const grouped = filteredProblems.reduce((acc, obj) => {
                let key = obj.topic;
                if (!acc[key]) {
                    acc[key] = [];
                }
                acc[key].push(obj);
                return acc;
            }, {});

            // Define custom order of topics based on metadata or fallback to alphabetical
            const sortedTopics = Object.keys(topicMetadata).filter(topic => grouped[topic]);

            // Also append any dynamic topics that might not be in metadata
            Object.keys(grouped).forEach(topic => {
                if (!sortedTopics.includes(topic)) sortedTopics.push(topic);
            });

            sortedTopics.forEach(topic => {
                const groupDiv = document.createElement('div');
                groupDiv.className = 'topic-group';

                const meta = topicMetadata[topic] || { icon: 'fa-layer-group', color: 'var(--accent-color)' };

                const completedInTopic = grouped[topic].filter(p => completedProblems.includes(p.title)).length;

                groupDiv.innerHTML = `
                    <div class="topic-header">
                        <div class="topic-icon" style="color: ${meta.color}; background: ${meta.color}15;">
                            <i class="fas ${meta.icon}"></i>
                        </div>
                        <h2>${topic}</h2>
                        <div class="topic-count">
                            <span style="color: var(--easy-color); font-weight: 600;">${completedInTopic}</span> / ${grouped[topic].length} items
                        </div>
                    </div>
                    <div class="grid">
                        ${grouped[topic].map(p => {
                    const isCompleted = completedProblems.includes(p.title);
                    return `
                                <a href="${p.url}" target="_blank" class="card ${isCompleted ? 'completed' : ''}">
                                    <div class="card-header">
                                        <div>
                                            <h3>${p.title}</h3>
                                            <span class="badge-difficulty ${p.difficulty.toLowerCase()}">${p.difficulty}</span>
                                        </div>
                                        <div class="check-btn" onclick="toggleComplete(event, '${p.title.replace(/'/g, "\\'")}')" title="Mark as completed">
                                            <i class="fas fa-check"></i>
                                        </div>
                                    </div>
                                    <div class="card-footer">
                                        <span class="topic-tag"><i class="fas fa-tag"></i> ${p.topic}</span>
                                        <div class="action-icon">
                                            <i class="fas fa-arrow-right"></i>
                                        </div>
                                    </div>
                                </a>
                            `;
                }).join('')}
                    </div>
                `;
                contentDiv.appendChild(groupDiv);
            });

            // Update global progress
            const totalProblems = problems.length;
            const completedCount = completedProblems.length;
            const progressPercentage = totalProblems === 0 ? 0 : Math.round((completedCount / totalProblems) * 100);

            document.getElementById('globalProgress').innerText = `${completedCount} / ${totalProblems} Completed (${progressPercentage}%)`;
            document.getElementById('progressBar').style.width = `${progressPercentage}%`;
        }

        // Event Listeners
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase();
            renderProblems();
        });

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderProblems();
            });
        });

        // Initial render
        renderProblems();
    </script>
